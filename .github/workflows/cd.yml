name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production

    env:
      BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/ai-web-aguiserver
      FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/ai-web-aguichat
      RESOURCE_GROUP: rg-ai-web-production
      BACKEND_APP: ca-ai-web-backend
      FRONTEND_APP: ca-ai-web-frontend

    steps:
      - name: Compute image tag from triggering commit SHA
        id: image-tag
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          echo "tag=sha-${SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update backend Container App image
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name "${{ env.BACKEND_APP }}" \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --image "${{ env.BACKEND_IMAGE }}:${{ steps.image-tag.outputs.tag }}"

      - name: Update frontend Container App image
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name "${{ env.FRONTEND_APP }}" \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --image "${{ env.FRONTEND_IMAGE }}:${{ steps.image-tag.outputs.tag }}"
