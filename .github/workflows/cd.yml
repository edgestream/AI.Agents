name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Kubernetes development
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: development

    env:
      BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/agents-server
      FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/agents-web
      SAMPLES_IMAGE: ghcr.io/${{ github.repository_owner }}/agents-samples
      K8S_NAMESPACE: development

    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag from triggering commit SHA
        id: image-tag
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          echo "tag=sha-${SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_CONTENT: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p "$RUNNER_TEMP/.kube"
          printf '%s' "$KUBE_CONFIG_CONTENT" > "$RUNNER_TEMP/.kube/config"
          chmod 600 "$RUNNER_TEMP/.kube/config"
          echo "KUBECONFIG=$RUNNER_TEMP/.kube/config" >> "$GITHUB_ENV"

      - name: Apply Kubernetes base
        run: kubectl apply -k deploy/k8s

      - name: Detect optional samples deployment
        id: detect-samples
        run: |
          if kubectl get service/agents-news --namespace "${{ env.K8S_NAMESPACE }}" >/dev/null 2>&1 && \
             kubectl get deployment/agents-news --namespace "${{ env.K8S_NAMESPACE }}" >/dev/null 2>&1; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update backend image
        run: |
          kubectl set image deployment/agents-backend \
            backend="${{ env.BACKEND_IMAGE }}:${{ steps.image-tag.outputs.tag }}" \
            --namespace "${{ env.K8S_NAMESPACE }}"

      - name: Update frontend image
        run: |
          kubectl set image deployment/agents-frontend \
            frontend="${{ env.FRONTEND_IMAGE }}:${{ steps.image-tag.outputs.tag }}" \
            --namespace "${{ env.K8S_NAMESPACE }}"

      - name: Update samples image
        if: ${{ steps.detect-samples.outputs.present == 'true' }}
        run: |
          kubectl set image deployment/agents-news \
            agents-news="${{ env.SAMPLES_IMAGE }}:${{ steps.image-tag.outputs.tag }}" \
            --namespace "${{ env.K8S_NAMESPACE }}"

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/agents-backend \
            --namespace "${{ env.K8S_NAMESPACE }}" \
            --timeout=5m
          kubectl rollout status deployment/agents-frontend \
            --namespace "${{ env.K8S_NAMESPACE }}" \
            --timeout=5m
          if [ "${{ steps.detect-samples.outputs.present }}" = "true" ]; then
            kubectl rollout status deployment/agents-news \
              --namespace "${{ env.K8S_NAMESPACE }}" \
              --timeout=5m
          fi
