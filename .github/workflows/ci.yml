name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/agents-server
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/agents-web

jobs:
  # ── Unit tests ──────────────────────────────────────────────────────────────
  # Runs on every push and pull request. Integration and Live tests are excluded.

  test-backend:
    name: Backend Build & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore src/Agents.slnx

      - name: Build
        run: dotnet build src/Agents.slnx --no-restore

      - name: Unit tests
        run: dotnet test --no-build --verbosity normal --filter "TestCategory!=ExternalDependency&TestCategory!=Live"

  test-frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/Web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # ── Container build + integration & live tests + push (main only) ────────────
  # Triggered only on pushes to main (i.e. after a PR is merged).
  # Builds the containers once with Buildx (load: true → local Docker daemon),
  # starts the full stack with --no-build, runs all tests that require external
  # services, then pushes the already-built layers – no second build.

  docker-build-test-push:
    name: Build, Test & Push Docker Images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [test-backend, test-frontend]
    environment: integration
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract backend metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Extract frontend metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Server/Dockerfile
          load: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: src/Web
          file: src/Web/Dockerfile
          load: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Create appsettings.Development.json
        run: |
          echo '{"Foundry":{"Endpoint":"${{ secrets.FOUNDRY_PROJECT_ENDPOINT }}","Model":"${{ secrets.FOUNDRY_MODEL }}"}}' > appsettings.Development.json

      - name: Export app registration credentials for local stack
        run: |
          echo "ENTRA_TENANT_ID=${{ secrets.ENTRA_TENANT_ID }}" >> $GITHUB_ENV
          echo "ENTRA_CLIENT_ID=${{ secrets.ENTRA_CLIENT_ID }}" >> $GITHUB_ENV
          echo "ENTRA_CLIENT_SECRET=${{ secrets.ENTRA_CLIENT_SECRET }}" >> $GITHUB_ENV
          echo "AZURE_TENANT_ID=${{ secrets.ENTRA_TENANT_ID }}" >> $GITHUB_ENV
          echo "AZURE_CLIENT_ID=${{ secrets.ENTRA_CLIENT_ID }}" >> $GITHUB_ENV
          echo "AZURE_CLIENT_SECRET=${{ secrets.ENTRA_CLIENT_SECRET }}" >> $GITHUB_ENV

      - name: Start stack
        run: docker compose up -d --no-build

      - name: Check startup logs
        if: always()
        run: docker compose logs

      - name: Wait for backend
        run: timeout 60 bash -c 'until curl -sf http://localhost:8080/health; do sleep 2; done'

      - name: Wait for frontend
        run: timeout 90 bash -c 'until curl -sf http://localhost:3000; do sleep 2; done'

      - name: Build tests (E2E)
        run: dotnet build tests/E2ETests

      - name: Install Playwright browsers
        run: pwsh tests/E2ETests/bin/Debug/net10.0/playwright.ps1 install --with-deps chromium

      - name: Run tests (E2E)
        run: dotnet test tests/E2ETests --no-build --verbosity normal --filter "TestCategory=ExternalDependency"
        env:
          E2E_BASE_URL: http://localhost:3000

      - name: Run tests (Live)
        run: dotnet test tests/Server.Tests/Server.Tests.csproj --verbosity normal --filter "TestCategory=Live"
        env:
          # Live tests use a bare WebApplicationFactory — config must come from env vars.
          # DefaultAzureCredential resolves via EnvironmentCredential when all three SP vars are set.
          # Live tests use a bare WebApplicationFactory — config must come from env vars.
          # Foundry path: DefaultAzureCredential resolves via EnvironmentCredential (SP vars).
          Foundry__Endpoint: ${{ secrets.FOUNDRY_PROJECT_ENDPOINT }}
          Foundry__Model: ${{ secrets.FOUNDRY_MODEL }}

      - name: Run tests (MealPlanner Live)
        run: dotnet test tests/samples/MealPlanner/MealPlanner.Tests.csproj --verbosity normal --filter "TestCategory=Live"

      - name: Stop stack
        if: always()
        run: docker compose down

      - name: Push backend image
        run: echo "$TAGS" | xargs -L1 docker push
        env:
          TAGS: ${{ steps.meta-backend.outputs.tags }}

      - name: Push frontend image
        run: echo "$TAGS" | xargs -L1 docker push
        env:
          TAGS: ${{ steps.meta-frontend.outputs.tags }}