apiVersion: v1
kind: Secret
metadata:
  name: ai-agents-frontend-auth
type: Opaque
stringData:
  AUTH_SESSION_SECRET: <long-random-secret>
  ENTRA_TENANT_ID: <tenant-id>
  ENTRA_CLIENT_ID: <client-id>
  ENTRA_CLIENT_SECRET: <client-secret>
  AUTH_REDIRECT_URI: https://<your-host>/api/auth/callback
  AUTH_POST_LOGOUT_REDIRECT_URI: https://<your-host>/
  AUTH_COOKIE_SECURE: "true"
