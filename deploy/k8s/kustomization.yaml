apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Apply this base with `kubectl apply -k deploy/k8s` so namespace and shared
# metadata labels stay consistent across all resources.

namespace: development

resources:
  - backend-deployment.yaml
  - backend-service.yaml
  - frontend-deployment.yaml
  - frontend-service.yaml
  - ingress.yaml

images:
  - name: ghcr.io/edgestream/agents-server
    newName: ghcr.io/edgestream/agents-server
    newTag: latest
  - name: ghcr.io/edgestream/agents-web
    newName: ghcr.io/edgestream/agents-web
    newTag: latest

labels:
  - pairs:
      app.kubernetes.io/part-of: development
