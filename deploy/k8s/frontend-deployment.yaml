apiVersion: apps/v1
kind: Deployment
metadata:
  name: agents-frontend
  labels:
    app.kubernetes.io/name: agents-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agents-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agents-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/edgestream/agents-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: BACKEND_URL
              value: http://agents-backend:8080
          envFrom:
            - secretRef:
                name: agents-frontend-auth
                optional: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /api/me
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/me
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
