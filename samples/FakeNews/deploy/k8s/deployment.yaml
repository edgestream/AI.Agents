apiVersion: apps/v1
kind: Deployment
metadata:
  name: agents-news
  labels:
    app: agents-news
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agents-news
  template:
    metadata:
      labels:
        app: agents-news
    spec:
      containers:
        - name: agents-news
          image: agents-news:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: http://+:8080
          readinessProbe:
            httpGet:
              path: /health
              port: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
