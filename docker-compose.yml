services:
  backend:
    build:
      context: .
      dockerfile: src/AI.Web.AGUIServer/Dockerfile
    image: ai-web-aguiserver:latest
    ports:
      - "8080:8080"
    environment:
      - AzureOpenAI__Endpoint=${AZURE_OPENAI_ENDPOINT}
      - AzureOpenAI__DeploymentName=${AZURE_OPENAI_DEPLOYMENT_NAME}
      - AzureOpenAI__ApiKey=${AZURE_OPENAI_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: src/AI.Web.AGUIChat
      dockerfile: Dockerfile
    image: ai-web-aguichat:latest
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8080/
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
