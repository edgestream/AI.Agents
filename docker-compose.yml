services:
  backend:
    build:
      context: .
      dockerfile: src/AI.AGUI.Server/Dockerfile
    image: ghcr.io/edgestream/ai-agui-server:latest
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - AZURE_TENANT_ID
      - AZURE_CLIENT_ID
      - AZURE_CLIENT_SECRET
    env_file:
      - path: .env
        required: false
    secrets:
      - source: appsettings_env
        target: appsettings.${ASPNETCORE_ENVIRONMENT:-Development}.json
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: src/AI.AGUI.Web
      dockerfile: Dockerfile
    image: ghcr.io/edgestream/ai-agui-web:latest
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8080/
      - AUTH_MODE=${AUTH_MODE:-}
      - AZURE_TENANT_ID
      - AZURE_CLIENT_ID
      - AZURE_CLIENT_SECRET
      - AUTH_SESSION_SECRET=${AUTH_SESSION_SECRET:-}
      - AUTH_COOKIE_SECURE=${AUTH_COOKIE_SECURE:-}
    sysctls:
      # Disable IPv6 — Docker on Windows has no IPv6 routing; without this Node.js
      # Happy Eyeballs tries IPv6 first and the AggregateError prevents token exchange.
      net.ipv6.conf.all.disable_ipv6: 1
    env_file:
      - path: .env
        required: false
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

secrets:
  appsettings_env:
    file: ./appsettings.${ASPNETCORE_ENVIRONMENT:-Development}.json
