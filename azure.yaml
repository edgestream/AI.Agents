# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: ai-agents

infra:
  provider: bicep
  path: infra

hooks:
  preprovision:
    posix:
      shell: sh
      run: |
        # Loads appsettings.{AZURE_ENV_NAME}.json into APPSETTINGS_JSON for Bicep.
        # Fails fast so a missing file causes a clear error before any resources are provisioned.
        FILE="appsettings.${AZURE_ENV_NAME}.json"
        if [ ! -f "$FILE" ]; then
          echo "ERROR: $FILE not found. Create it from appsettings.json.example before deploying." >&2
          exit 1
        fi
        echo "Loading $FILE into APPSETTINGS_JSON"
        azd env set APPSETTINGS_JSON "$(cat "$FILE")"
    windows:
      shell: pwsh
      run: |
        # Loads appsettings.{AZURE_ENV_NAME}.json into APPSETTINGS_JSON for Bicep.
        # Fails fast so a missing file causes a clear error before any resources are provisioned.
        $file = "appsettings.$($env:AZURE_ENV_NAME).json"
        if (-not (Test-Path $file)) {
          Write-Error "ERROR: $file not found. Create it from appsettings.json.example before deploying."
          exit 1
        }
        Write-Host "Loading $file into APPSETTINGS_JSON"
        azd env set APPSETTINGS_JSON (Get-Content $file -Raw)

services:
  backend:
    project: .
    language: docker
    host: containerapp
    docker:
      path: src/Server/Dockerfile
      context: .
      registry: ghcr.io/edgestream
      image: agents-server
