# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: ai-web

infra:
  provider: bicep
  path: infra

hooks:
  preprovision:
    posix:
      shell: sh
      run: |
        # Picks up appsettings.{AZURE_ENV_NAME}.json from the repo root.
        # e.g. 'azd env new Development' → reads appsettings.Development.json
        FILE="appsettings.${AZURE_ENV_NAME}.json"
        if [ -f "$FILE" ]; then
          echo "Found $FILE - loading into APPSETTINGS_JSON"
          azd env set APPSETTINGS_JSON "$(cat "$FILE")"
        fi
    windows:
      shell: pwsh
      run: |
        # Picks up appsettings.{AZURE_ENV_NAME}.json from the repo root.
        # e.g. 'azd env new Development' -> reads appsettings.Development.json
        $file = "appsettings.$($env:AZURE_ENV_NAME).json"
        if (Test-Path $file) {
          Write-Host "Found $file - loading into APPSETTINGS_JSON"
          azd env set APPSETTINGS_JSON (Get-Content $file -Raw)
        }

services:
  backend:
    host: containerapp
    image: ghcr.io/edgestream/ai-web-aguiserver:latest

  frontend:
    host: containerapp
    image: ghcr.io/edgestream/ai-web-aguichat:latest
