# docker-compose.e2e.yml
#
# Starts only the Next.js frontend for E2E testing. The backend is started
# automatically by the test assembly fixture (StubBackendFixture) using
# WebApplicationFactory<Program> bound to http://localhost:8080, so no separate
# backend container is needed.
#
# Usage (Linux / macOS):
#   docker compose -f docker-compose.e2e.yml up --build -d
#   E2E_LIVE_TEST=true dotnet test tests/AI.Web.E2ETests
#   docker compose -f docker-compose.e2e.yml down
#
# Alternatively, run the frontend locally without Docker:
#   cd src/AI.Web.AGUIChat && BACKEND_URL=http://localhost:8080/ npm run dev

services:
  frontend:
    build:
      context: src/AI.Web.AGUIChat
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Point the frontend at the test-fixture-managed backend on the host machine.
      - BACKEND_URL=http://host.docker.internal:8080/
    extra_hosts:
      # Resolve host.docker.internal on Linux (already available on macOS/Windows).
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
