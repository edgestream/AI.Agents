# docker-compose.e2e.yml
#
# Extends the main docker-compose.yml by replacing the backend service with a
# lightweight AG-UI stub so that E2E tests can run without Azure credentials.
#
# Usage:
#   docker compose -f docker-compose.e2e.yml up --build -d
#   E2E_LIVE_TEST=true dotnet test tests/AI.Web.E2ETests
#   docker compose -f docker-compose.e2e.yml down

services:
  backend:
    build:
      context: tests/AI.Web.E2ETests/stub
      dockerfile: Dockerfile
    image: ai-web-aguiserver-stub
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: src/AI.Web.AGUIChat
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8080/
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
